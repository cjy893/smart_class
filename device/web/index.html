<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>智慧课堂 - 端侧控制</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
       background: #0f1923; color: #e0e0e0; min-height: 100vh; padding: 16px; }
.header { text-align: center; padding: 12px 0; border-bottom: 1px solid #1e3a5f; margin-bottom: 16px; }
.header h1 { font-size: 1.2em; color: #4fc3f7; }
.header .status { font-size: 0.8em; color: #888; margin-top: 4px; }
.count-card { background: #1a2938; border-radius: 12px; padding: 20px; text-align: center; margin-bottom: 16px; }
.count-card .count { font-size: 4em; font-weight: bold; color: #4fc3f7; }
.count-card .label { font-size: 0.9em; color: #888; margin-top: 4px; }
.screenshot { background: #1a2938; border-radius: 12px; padding: 8px; margin-bottom: 16px; text-align: center; }
.screenshot img { max-width: 100%; border-radius: 8px; }
.actions { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 16px; }
.btn { border: none; border-radius: 10px; padding: 14px 8px; font-size: 0.85em; font-weight: 600;
       cursor: pointer; transition: opacity 0.2s; color: #fff; }
.btn:active { opacity: 0.7; }
.btn-attendance { background: #2e7d32; }
.btn-behavior { background: #e65100; }
.btn-report { background: #1565c0; }
.policy-bar { background: #1a2938; border-radius: 12px; padding: 12px 16px; margin-bottom: 12px;
              display: flex; justify-content: space-between; align-items: center; }
.policy-bar .policy-label { font-size: 0.85em; color: #888; }
.policy-bar .policy-value { font-size: 0.9em; color: #ffab40; font-weight: 600; }
.policy-bar select { background: #253545; color: #e0e0e0; border: 1px solid #333; border-radius: 6px;
                      padding: 6px 10px; font-size: 0.85em; }
.result { background: #1a2938; border-radius: 12px; padding: 12px 16px; margin-bottom: 12px;
          font-size: 0.85em; }
.result .result-title { color: #4fc3f7; margin-bottom: 8px; font-weight: 600; }
.result pre { white-space: pre-wrap; word-break: break-all; color: #b0b0b0; font-size: 0.8em; }
.error { background: #4a1a1a; border-radius: 8px; padding: 10px 14px; color: #ef5350;
         font-size: 0.85em; margin-bottom: 12px; display: none; }
.error.visible { display: block; }
.refresh { text-align: center; font-size: 0.7em; color: #555; margin-top: 16px; }
</style>
</head>
<body>
<div class="header">
  <h1>智慧课堂监控</h1>
  <div class="status" id="status">--</div>
</div>

<div class="count-card">
  <div class="count" id="person-count">--</div>
  <div class="label">当前人数</div>
</div>

<div class="screenshot">
  <img id="screenshot" src="" alt="摄像头画面" style="display:none;">
  <div id="no-screenshot" style="color:#555; padding:20px;">等待画面...</div>
</div>

<div class="actions">
  <button class="btn btn-attendance" onclick="action('attendance')">签到</button>
  <button class="btn btn-behavior" onclick="action('behavior')">课堂分析</button>
  <button class="btn btn-report" onclick="action('report')">生成报告</button>
</div>

<div class="policy-bar">
  <span class="policy-label">调度策略</span>
  <span class="policy-value" id="policy-value">adaptive</span>
  <select id="policy-select" onchange="changePolicy(this.value)">
    <option value="greedy_nearby">贪心就近</option>
    <option value="load_balance">负载均衡</option>
    <option value="adaptive" selected>自适应</option>
  </select>
</div>

<div class="error" id="error-msg"></div>

<div class="result">
  <div class="result-title">最近任务结果</div>
  <pre id="last-result">暂无</pre>
</div>

<div class="refresh">每 2 秒自动刷新</div>

<script>
const BASE = '';

function $(id) { return document.getElementById(id); }

function showError(msg) {
  const el = $('error-msg');
  if (msg) { el.textContent = msg; el.classList.add('visible'); }
  else { el.classList.remove('visible'); }
}

async function refreshStatus() {
  try {
    const resp = await fetch(BASE + '/api/status');
    const data = await resp.json();
    $('person-count').textContent = data.person_count >= 0 ? data.person_count : '--';
    $('policy-value').textContent = data.policy;
    $('policy-select').value = data.policy;
    $('status').textContent = 'Session: ' + (data.session_id || '(非上课时段)');
    showError(data.error || null);
  } catch(e) {
    $('status').textContent = '连接中...';
  }
}

async function refreshScreenshot() {
  try {
    const resp = await fetch(BASE + '/api/screenshot');
    if (resp.ok) {
      const blob = await resp.blob();
      if (blob.size > 0) {
        const url = URL.createObjectURL(blob);
        const img = $('screenshot');
        img.src = url;
        img.style.display = 'block';
        $('no-screenshot').style.display = 'none';
      }
    }
  } catch(e) {}
}

async function refreshLastResult() {
  try {
    const resp = await fetch(BASE + '/api/last_result');
    const data = await resp.json();
    if (data && Object.keys(data).length > 0) {
      $('last-result').textContent = JSON.stringify(data, null, 2);
    }
  } catch(e) {}
}

async function action(type) {
  try {
    showError(null);
    await fetch(BASE + '/api/action/' + type, { method: 'POST' });
    setTimeout(refreshAll, 500);
  } catch(e) {
    showError('操作失败: ' + e.message);
  }
}

async function changePolicy(policy) {
  try {
    await fetch(BASE + '/api/action/policy/' + policy, { method: 'POST' });
    $('policy-value').textContent = policy;
  } catch(e) {}
}

function refreshAll() {
  refreshStatus();
  refreshScreenshot();
  refreshLastResult();
}

refreshAll();
setInterval(refreshAll, 2000);
</script>
</body>
</html>
